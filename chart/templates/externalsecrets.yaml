apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spotify-credentials
spec:
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: spotify-credentials
  data:
    - secretKey: client_id
      remoteRef:
        key: itsbeginningtolookalotlikechristmas/spotify
        property: client_id
    - secretKey: client_secret
      remoteRef:
        key: itsbeginningtolookalotlikechristmas/spotify
        property: client_secret
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: git-deploy-key
spec:
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  refreshInterval: 1h
  target:
    name: git-deploy-key
  data:
    - secretKey: ssh_privatekey
      remoteRef:
        key: platform/evoteumbot
        property: ssh_privatekey
